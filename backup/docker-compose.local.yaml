services:
  letta-core:
    image: letta/letta:0.16.5
    container_name: letta-core
    ports:
      - "8283:8283"
    volumes:
      - ./data/letta-server:/var/lib/postgresql/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - letta-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8283/v1/health" ]
      interval: 20s
      timeout: 5s
      retries: 3

  letta-bot:
    build:
      context: .
      dockerfile: Dockerfile.lettabot
    container_name: letta-bot
    depends_on:
      letta-core:
        condition: service_healthy
    volumes:
      - ./data/letta-bot:/app/data
      - ./lettabot.local.yaml:/app/lettabot.yaml
    environment:
      - AGENT_MODEL=${AGENT_MODEL}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ALLOWED_USERS=${ALLOWED_USERS}
    networks:
      - letta-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "node", "-v" ] # basic health check
      interval: 10s
      timeout: 5s
      retries: 3

  letta-workspace:
    build:
      context: .
      dockerfile: Dockerfile.workspace
    container_name: letta-workspace
    depends_on:
      letta-core:
        condition: service_healthy
      letta-bot:
        condition: service_started
    volumes:
      - ./data/letta-workspace:/workspace
    environment:
      - LETTA_BASE_URL=http://letta-core:8283
    networks:
      - letta-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: [ "CMD", "python3", "--version" ] # basic health check
      interval: 10s
      timeout: 5s
      retries: 3
    command: tail -f /dev/null

  dashboard:
    build:
      context: ./monitoring
      dockerfile: Dockerfile
    container_name: letta-dashboard
    ports:
      - "8080:8080"
    environment:
      - LETTA_SERVER_URL=http://letta-core:8283
    networks:
      - letta-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      letta-core:
        condition: service_healthy

networks:
  letta-network:
    driver: bridge
