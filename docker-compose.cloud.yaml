services:
  letta-bot:
    build:
      context: .
      dockerfile: Dockerfile.lettabot
    container_name: letta-bot
    depends_on:
      letta-server:
        condition: service_healthy
    volumes:
      - ./data/letta-bot:/app/data
      - ./lettabot.cloud.yaml:/app/lettabot.yaml:ro
    environment:
      - LETTA_BASE_URL=${LETTA_BASE_URL:-https://api.letta.com}
      - LETTA_API_KEY=${LETTA_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_DM_POLICY=open
      - DATA_DIR=/app/data
    networks:
      - letta-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "node", "-v" ] # basic health check
      interval: 10s
      timeout: 5s
      retries: 3
    profiles:
      - cloud

  letta-workspace:
    build:
      context: .
      dockerfile: Dockerfile.workspace
    container_name: letta-workspace
    depends_on:
      letta-server:
        condition: service_healthy
    volumes:
      - ./data/letta-workspace:/workspace
    environment:
      - LETTA_BASE_URL=${LETTA_BASE_URL:-https://api.letta.com}
    networks:
      - letta-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python3", "--version" ] # basic health check
      interval: 10s
      timeout: 5s
      retries: 3
    command: tail -f /dev/null
    profiles:
      - cloud

networks:
  letta-network:
    driver: bridge
